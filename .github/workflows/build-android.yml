name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release, or leave blank for an artifact-only build"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "mobile_app/**"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.6"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Name standalone APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/MoneyManager.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-android-release
          path: mobile_app/build/app/outputs/flutter-apk/MoneyManager.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Money Manager ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: mobile_app/build/app/outputs/flutter-apk/MoneyManager.apk

      - name: Add permanent download link to job summary
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        run: |
          download_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/MoneyManager.apk"
          echo "Download: [$download_url]($download_url)" >> "$GITHUB_STEP_SUMMARY"
