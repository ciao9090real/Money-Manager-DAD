name: Build and release Windows desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build and release (for example, v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: desktop_app

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: desktop_app/requirements.lock

      - name: Install locked dependencies and PyInstaller
        run: python -m pip install -r requirements.lock

      - name: Build standalone Windows executable
        run: >-
          python -m PyInstaller
          --onefile
          --windowed
          --name MoneyManager
          --noconfirm
          --clean
          main.py

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash .\dist\MoneyManager.exe -Algorithm SHA256
          "$($hash.Hash)  MoneyManager.exe" | Out-File -FilePath .\dist\MoneyManager.exe.sha256.txt -Encoding ascii

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Money Manager ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            desktop_app/dist/MoneyManager.exe
            desktop_app/dist/MoneyManager.exe.sha256.txt

      - name: Add permanent download link to job summary
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/MoneyManager.exe"
          $checksumUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/MoneyManager.exe.sha256.txt"
          $hash = Get-Content .\dist\MoneyManager.exe.sha256.txt
          "Download: [$downloadUrl]($downloadUrl)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Checksum: [$checksumUrl]($checksumUrl)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "``````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "$hash" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "``````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append