name: Desktop

on:
  push:
    paths:
      - "desktop_app/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop_app/**"
      - ".github/workflows/desktop.yml"

jobs:
  test-and-package:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: desktop_app/requirements.lock
      - name: Install locked dependencies
        run: python -m pip install -r requirements.lock
      - name: Compile Python sources
        run: python -m compileall -q app tests main.py
      - name: Run tests, migrations, and integrity checks
        run: python -m pytest -p no:cacheprovider
      - name: Build Windows package
        run: python -m PyInstaller MoneyManager.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-windows
          path: desktop_app/dist/MoneyManager/
          if-no-files-found: error
