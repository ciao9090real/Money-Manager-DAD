name: Generate keystore (one-time, delete after use)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore money-manager-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias moneymanager \
            -storepass "REPLACE_WITH_A_STRONG_PASSWORD" \
            -keypass "REPLACE_WITH_A_STRONG_PASSWORD" \
            -dname "CN=Money Manager, OU=Dev, O=Personal, L=City, S=State, C=IT"

      - name: Base64 encode
        run: base64 -w 0 money-manager-release.jks > keystore-base64.txt

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: money-manager-keystore
          path: |
            money-manager-release.jks
            keystore-base64.txt
          retention-days: 1
